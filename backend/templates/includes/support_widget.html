{% if support_widget_enabled and support_widget_embed_url %}
<style>
  .support-widget {
    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 1200;
  }

  .support-widget__trigger {
    border: 0;
    width: 60px;
    height: 60px;
    border-radius: 999px;
    background: linear-gradient(135deg, #0b7a75, #0f9d92);
    color: #fff;
    box-shadow: 0 18px 40px rgba(11, 122, 117, 0.28);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    position: relative;
  }

  .support-widget__trigger:hover {
    transform: translateY(-2px);
    box-shadow: 0 22px 48px rgba(11, 122, 117, 0.34);
  }

  .support-widget__pill {
    position: absolute;
    right: 72px;
    bottom: 10px;
    background: rgba(15, 23, 42, 0.92);
    color: #fff;
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1;
    white-space: nowrap;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
  }

  .support-widget__backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.38);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
    z-index: 1198;
  }

  .support-widget__modal {
    position: fixed;
    right: 24px;
    bottom: 96px;
    width: min(420px, calc(100vw - 32px));
    height: min(700px, calc(100vh - 140px));
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 28px 70px rgba(15, 23, 42, 0.28);
    border: 1px solid rgba(15, 23, 42, 0.08);
    opacity: 0;
    transform: translateY(16px) scale(0.98);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 1199;
    display: flex;
    flex-direction: column;
  }

  .support-widget__modal.is-open,
  .support-widget__backdrop.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  .support-widget__modal.is-open {
    transform: translateY(0) scale(1);
  }

  .support-widget__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #0b7a75, #0f9d92);
    color: #fff;
  }

  .support-widget__title {
    min-width: 0;
  }

  .support-widget__title strong,
  .support-widget__title small {
    display: block;
    color: inherit;
  }

  .support-widget__title small {
    opacity: 0.86;
    margin-top: 2px;
  }

  .support-widget__header-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .support-widget__link,
  .support-widget__close {
    border: 0;
    background: rgba(255, 255, 255, 0.16);
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    cursor: pointer;
  }

  .support-widget__link:hover,
  .support-widget__close:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.24);
    text-decoration: none;
  }

  .support-widget__frame-wrap {
    flex: 1;
    min-height: 0;
    background: #f8fafc;
  }

  .support-widget__frame {
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }

  body.support-widget-open {
    overflow: hidden;
  }

  @media (max-width: 575.98px) {
    .support-widget {
      right: 16px;
      bottom: 16px;
    }

    .support-widget__pill {
      display: none;
    }

    .support-widget__modal {
      right: 12px;
      left: 12px;
      bottom: 84px;
      width: auto;
      height: min(78vh, 680px);
      border-radius: 18px;
    }
  }
</style>

<div class="support-widget" data-support-widget>
  <button
    type="button"
    class="support-widget__trigger"
    data-support-open
    aria-label="Open {{ support_widget_label }}"
    title="Open {{ support_widget_label }}"
  >
    <span class="support-widget__pill">Chatbot</span>
    <span aria-hidden="true">
      <i class="bi bi-chat-dots-fill"></i>
    </span>
  </button>
</div>

<div class="support-widget__backdrop" data-support-backdrop></div>

<section
  class="support-widget__modal"
  data-support-modal
  role="dialog"
  aria-modal="true"
  aria-labelledby="support-widget-title"
  aria-hidden="true"
>
  <header class="support-widget__header">
    <div class="support-widget__title">
      <strong id="support-widget-title">{{ support_widget_label }} Chatbot</strong>
      <small>In-clinic help for this page</small>
    </div>
    <div class="support-widget__header-actions">
      <a
        href="{{ support_widget_url }}"
        target="_blank"
        rel="noopener noreferrer"
        class="support-widget__link"
        aria-label="Open support in a new tab"
        title="Open support in a new tab"
      >
        <i class="bi bi-box-arrow-up-right"></i>
      </a>
      <button
        type="button"
        class="support-widget__close"
        data-support-close
        aria-label="Close support"
        title="Close support"
      >
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </header>
  <div class="support-widget__frame-wrap">
    <iframe
      class="support-widget__frame"
      data-support-iframe
      data-src="{{ support_widget_embed_url }}"
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
      title="{{ support_widget_label }}"
    ></iframe>
  </div>
</section>

<script>
  (() => {
    const trigger = document.querySelector("[data-support-open]");
    const modal = document.querySelector("[data-support-modal]");
    const backdrop = document.querySelector("[data-support-backdrop]");
    const iframe = document.querySelector("[data-support-iframe]");
    const closeButtons = document.querySelectorAll("[data-support-close]");

    if (!trigger || !modal || !backdrop || !iframe || modal.dataset.supportBound === "1") {
      return;
    }

    modal.dataset.supportBound = "1";

    const openModal = () => {
      if (!iframe.getAttribute("src")) {
        iframe.setAttribute("src", iframe.dataset.src || "");
      }
      modal.classList.add("is-open");
      backdrop.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.classList.add("support-widget-open");
    };

    const closeModal = () => {
      modal.classList.remove("is-open");
      backdrop.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("support-widget-open");
    };

    trigger.addEventListener("click", openModal);
    backdrop.addEventListener("click", closeModal);
    closeButtons.forEach((button) => button.addEventListener("click", closeModal));
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) {
        closeModal();
      }
    });
  })();
</script>
{% endif %}
